<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #111111;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .screen { display: none; width: 100%; max-width: 400px; padding: 2rem 1.5rem; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
  .screen.active { display: flex; }

  /* ACCESO */
  .logo-wrap { text-align: center; margin-bottom: 3rem; }
  .logo-circulo {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid #111;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
  }
  .logo-word {
    font-family: 'Playfair Display', serif;
    font-size: 42px; font-weight: 900;
    letter-spacing: 0.12em;
    color: #111;
  }

  .field-label { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; color: #888; margin-bottom: 12px; display: block; }
  .field-input {
    width: 100%; background: #f5f5f5;
    border: 2px solid #eee; border-radius: 4px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 400;
    color: #111; letter-spacing: 0.15em; text-align: center;
    outline: none; transition: border-color 0.2s;
  }
  .field-input::placeholder { color: #bbb; font-size: 14px; letter-spacing: 0.08em; }
  .field-input:focus { border-color: #111; background: #fff; }

  .access-btn {
    width: 100%; margin-top: 1.25rem; padding: 16px;
    background: #111; border: none; border-radius: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    letter-spacing: 0.2em; color: #fff;
    cursor: pointer; transition: background 0.2s;
  }
  .access-btn:hover { background: #7d9b76; }
  .access-error { font-size: 12px; color: #c0504a; text-align: center; margin-top: 0.75rem; min-height: 18px; font-weight: 500; }
  .access-footer { font-size: 12px; color: #888; text-align: center; margin-top: 3rem; line-height: 2; }
  .link-verde { color: #7d9b76; cursor: pointer; font-weight: 500; }

  /* APP */
  .app-header {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 1rem; margin-bottom: 1.5rem;
    border-bottom: 2px solid #111;
  }
  .app-logo {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 900; letter-spacing: 0.1em; color: #111;
  }
  .app-fecha { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: #888; text-align: right; line-height: 1.8; text-transform: uppercase; }

  .tap-hint { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; color: #aaa; text-align: center; margin-bottom: 0.75rem; transition: opacity 0.3s; text-transform: uppercase; }

  .card-wrap { width: 100%; margin-bottom: 1rem; cursor: pointer; }

  .oracle-card {
    width: 100%;
    background: #fff;
    border: 2px solid #111;
    border-radius: 8px;
    padding: 2.5rem 1.75rem;
    min-height: 320px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    transition: background 0.2s;
    position: relative;
  }
  .oracle-card:hover { background: #f9f9f9; }

  /* Tag arriba derecha como en la foto */
  .card-tag {
    position: absolute; top: 14px; right: 14px;
    background: #7d9b76; color: #fff;
    font-size: 9px; font-weight: 500; letter-spacing: 0.16em;
    padding: 4px 10px; border-radius: 20px;
    text-transform: uppercase;
  }

  .card-idle { display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }
  .idle-num {
    font-family: 'Playfair Display', serif;
    font-size: 64px; font-weight: 900; color: #111; line-height: 1;
  }
  .idle-text {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-style: italic; color: #555; line-height: 1.6;
  }
  .idle-hint { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; color: #bbb; text-transform: uppercase; }

  .card-revealed { display: none; flex-direction: column; align-items: center; gap: 1rem; width: 100%; }
  .r-num {
    font-family: 'Playfair Display', serif;
    font-size: 72px; font-weight: 900; color: #111; line-height: 1;
  }
  .r-nombre {
    font-family: 'Playfair Display', serif;
    font-size: 28px; font-weight: 700; color: #111; letter-spacing: 0.04em;
  }
  .r-area { font-size: 11px; font-weight: 500; letter-spacing: 0.18em; color: #7d9b76; text-transform: uppercase; }
  .linea { width: 40px; height: 2px; background: #111; margin: 0.25rem 0; }
  .r-mensaje {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-style: italic; color: #333;
    line-height: 1.75; padding: 0 0.25rem;
  }
  .afirmacion-wrap {
    width: 100%; background: #f5f5f5;
    border-radius: 6px; padding: 1rem 1.25rem; margin-top: 0.5rem;
  }
  .afirmacion-label { font-size: 9px; font-weight: 500; letter-spacing: 0.2em; color: #7d9b76; margin-bottom: 6px; text-transform: uppercase; }
  .afirmacion-text {
    font-family: 'Playfair Display', serif;
    font-size: 15px; font-weight: 700; color: #111; line-height: 1.6;
  }

  /* AFTER */
  .after-section { width: 100%; display: none; flex-direction: column; gap: 0.875rem; }
  .after-section.visible { display: flex; }

  .reflexion-label { font-size: 11px; font-weight: 500; letter-spacing: 0.16em; color: #888; margin-bottom: 8px; text-transform: uppercase; }
  .reflexion-input {
    width: 100%; background: #f5f5f5;
    border: 2px solid #eee; border-radius: 6px;
    padding: 12px 14px;
    font-family: 'Playfair Display', serif; font-size: 15px; font-style: italic;
    color: #111; resize: none; min-height: 76px;
    outline: none; transition: border-color 0.2s; line-height: 1.7;
  }
  .reflexion-input::placeholder { color: #bbb; }
  .reflexion-input:focus { border-color: #111; }

  .btn-nueva {
    width: 100%; padding: 15px;
    background: #fff; border: 2px solid #111; border-radius: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 0.18em; color: #111; cursor: pointer;
    transition: background 0.2s; text-transform: uppercase;
  }
  .btn-nueva:hover { background: #f0f0f0; }

  .app-footer { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; color: #ccc; text-align: center; margin-top: 1.5rem; text-transform: uppercase; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.5s ease forwards; }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: #111; color: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 0.1em; padding: 10px 22px; border-radius: 4px;
    opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- ACCESO -->
<div class="screen active" id="screen-access">
  <div class="logo-wrap">
    <div class="logo-circulo">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="15" r="3" fill="#111"/>
        <circle cx="15" cy="4" r="1.5" fill="#111"/>
        <circle cx="15" cy="26" r="1.5" fill="#111"/>
        <circle cx="4" cy="15" r="1.5" fill="#111"/>
        <circle cx="26" cy="15" r="1.5" fill="#111"/>
        <line x1="15" y1="6" x2="15" y2="12" stroke="#111" stroke-width="1"/>
        <line x1="15" y1="18" x2="15" y2="24" stroke="#111" stroke-width="1"/>
        <line x1="6" y1="15" x2="12" y2="15" stroke="#111" stroke-width="1"/>
        <line x1="18" y1="15" x2="24" y2="15" stroke="#111" stroke-width="1"/>
      </svg>
    </div>
    <div class="logo-word">ORIGEN</div>
  </div>

  <div style="width:100%">
    <label class="field-label">Código de acceso</label>
    <input class="field-input" id="codigo-input" type="text" placeholder="ingresa tu código" autocomplete="off" spellcheck="false">
    <div class="access-error" id="access-error"></div>
    <button class="access-btn" onclick="verificarCodigo()">ENTRAR</button>
  </div>

  <div class="access-footer">
    ¿Aún no tienes acceso?<br>
    <span class="link-verde" onclick="alert('Próximamente en origen.app')">Obtén el tuyo aquí</span>
  </div>
</div>

<!-- APP -->
<div class="screen" id="screen-app">
  <div class="app-header">
    <div class="app-logo">ORIGEN</div>
    <div class="app-fecha" id="app-fecha"></div>
  </div>

  <p class="tap-hint" id="tap-hint">Toca para recibir tu mensaje</p>

  <div class="card-wrap" onclick="revelarCarta()">
    <div class="oracle-card" id="oracle-card">
      <div class="card-tag" id="card-tag-idle">Oráculo diario</div>

      <div class="card-idle" id="card-idle">
        <div class="idle-num" id="idle-num">?</div>
        <div class="idle-text">el universo ya eligió<br>tu mensaje de hoy</div>
        <div class="idle-hint">— presiona para revelar —</div>
      </div>

      <div class="card-revealed" id="card-revealed">
        <div class="card-tag" style="position:absolute;top:14px;right:14px;background:#7d9b76;color:#fff;font-size:9px;font-weight:500;letter-spacing:0.16em;padding:4px 10px;border-radius:20px;" id="r-area-tag"></div>
        <div class="r-num" id="r-num"></div>
        <div class="r-nombre" id="r-nombre"></div>
        <div class="r-area" id="r-area"></div>
        <div class="linea"></div>
        <div class="r-mensaje" id="r-mensaje"></div>
        <div class="afirmacion-wrap">
          <div class="afirmacion-label">Afirmación del día</div>
          <div class="afirmacion-text" id="r-afirmacion"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="after-section" id="after-section">
    <div>
      <div class="reflexion-label">Espacio de reflexión</div>
      <textarea class="reflexion-input" placeholder="¿qué te resonó de este mensaje?..." rows="3"></textarea>
    </div>
    <button class="btn-nueva" onclick="nuevaLectura()">Nueva lectura ↻</button>
  </div>

  <div class="app-footer">#vuelveatorigen</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const CODIGOS = ["ORIGEN2025", "BARRAS01", "YALUZ"];

  const PUNTOS = [
    { num: "1.", nombre: "Dinero", area: "Abundancia", mensaje: "La abundancia no es algo que persigues. Es algo que permites cuando dejas de creer que no mereces recibirla.", afirmacion: "Recibo con facilidad todo lo que el universo tiene para mí, ahora y siempre." },
    { num: "5.", nombre: "Creatividad", area: "Creación", mensaje: "Tu creatividad no necesita permiso ni validación. Ya existe. Solo necesita espacio para fluir sin ser juzgada.", afirmacion: "Soy un canal abierto para ideas que transforman mi mundo y el de los demás." },
    { num: "9.", nombre: "Cuerpo", area: "Bienestar", mensaje: "Tu cuerpo sabe más de lo que tu mente cree. Detente hoy y escúchalo. Una señal pequeña puede cambiarlo todo.", afirmacion: "Mi cuerpo es mi aliado más sabio. Lo honro, lo escucho, lo cuido." },
    { num: "12.", nombre: "Control", area: "Libertad", mensaje: "¿Y si el control fuera solo un punto de vista que puedes elegir soltar? La vida fluye mejor cuando dejas de aferrarte a cómo debería ser.", afirmacion: "Confío en el flujo de mi vida y me permito ser sin resistencia." },
    { num: "17.", nombre: "Esperanza", area: "Posibilidad", mensaje: "La esperanza no es ingenua — es un acto de valentía. Elige hoy ver la posibilidad donde otros solo ven un límite.", afirmacion: "Elijo la posibilidad por encima de la certeza. Siempre hay otra forma." },
    { num: "21.", nombre: "Gratitud", area: "Presencia", mensaje: "Gratitud no es solo agradecer lo bueno. Es reconocer que incluso lo difícil te lleva hacia quien estás destinada a ser.", afirmacion: "Gracias por todo lo que soy, todo lo que tengo y todo lo que estoy creando." },
    { num: "25.", nombre: "Paz", area: "Calma", mensaje: "La paz que buscas afuera ya existe dentro de ti. Hoy no tienes que buscarla — solo recuerda que siempre estuvo ahí.", afirmacion: "Soy paz. La irradio, la vivo, la elijo en cada momento." },
    { num: "29.", nombre: "Vitalidad", area: "Energía", mensaje: "Tu energía es tu recurso más poderoso. Cuida hoy a quién y qué la recibe. No toda puerta merece que la abras.", afirmacion: "Mi energía es sagrada. La dirijo con consciencia hacia lo que me expande." },
    { num: "32.", nombre: "Consciencia", area: "Expansión", mensaje: "Hoy eres más consciente que ayer. Eso es suficiente. La consciencia no se mide — se vive, se siente, se elige.", afirmacion: "Me expando más allá de lo que creía posible. Soy más de lo que pienso." }
  ];

  let revealed = false;
  let puntoActual = null;

  function verificarCodigo() {
    const val = document.getElementById('codigo-input').value.trim().toUpperCase();
    const err = document.getElementById('access-error');
    if (CODIGOS.includes(val)) {
      document.getElementById('screen-access').classList.remove('active');
      document.getElementById('screen-app').classList.add('active');
      setFecha();
      setIdleNum();
    } else {
      err.textContent = 'Código no válido — verifica e intenta de nuevo';
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  document.getElementById('codigo-input').addEventListener('keydown', e => { if (e.key === 'Enter') verificarCodigo(); });

  function setFecha() {
    const d = new Date();
    const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    document.getElementById('app-fecha').innerHTML = `${dias[d.getDay()]}<br>${d.getDate()} ${meses[d.getMonth()]}`;
  }

  function getPunto() {
    return PUNTOS[Math.floor(Math.random() * PUNTOS.length)];
  }

  function setIdleNum() {
    puntoActual = getPunto();
    document.getElementById('idle-num').textContent = puntoActual.num;
  }

  function revelarCarta() {
    if (revealed) return;
    revealed = true;
    const p = puntoActual;
    document.getElementById('r-num').textContent = p.num;
    document.getElementById('r-nombre').textContent = p.nombre;
    document.getElementById('r-area').textContent = p.area.toUpperCase();
    document.getElementById('r-area-tag').textContent = p.area;
    document.getElementById('r-mensaje').textContent = p.mensaje;
    document.getElementById('r-afirmacion').textContent = p.afirmacion;
    document.getElementById('card-idle').style.display = 'none';
    document.getElementById('card-tag-idle').style.display = 'none';
    const rev = document.getElementById('card-revealed');
    rev.style.display = 'flex';
    rev.classList.add('fade-up');
    document.getElementById('tap-hint').style.opacity = '0';
    document.getElementById('after-section').classList.add('visible');
    document.getElementById('oracle-card').style.cursor = 'default';
  }

  function nuevaLectura() {
    revealed = false;
    puntoActual = getPunto();
    document.getElementById('idle-num').textContent = puntoActual.num;
    document.getElementById('card-idle').style.display = 'flex';
    document.getElementById('card-tag-idle').style.display = 'block';
    const rev = document.getElementById('card-revealed');
    rev.style.display = 'none';
    rev.classList.remove('fade-up');
    document.getElementById('after-section').classList.remove('visible');
    document.getElementById('tap-hint').style.opacity = '1';
    document.getElementById('oracle-card').style.cursor = 'pointer';
  }
</script>
</body>
</html>
