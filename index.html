<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Origen</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #ffffff;
    color: #111111;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .screen { display: none; width: 100%; max-width: 400px; padding: 2rem 1.5rem; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
  .screen.active { display: flex; }

  /* ACCESO */
  .logo-wrap { text-align: center; margin-bottom: 3rem; }
  .logo-circulo {
    width: 64px; height: 64px; border-radius: 50%;
    border: 2px solid #111;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.25rem;
  }
  .logo-word { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 900; letter-spacing: 0.12em; color: #111; }

  .field-label { font-size: 11px; font-weight: 500; letter-spacing: 0.2em; color: #888; margin-bottom: 12px; display: block; text-transform: uppercase; }
  .field-input {
    width: 100%; background: #f5f5f5;
    border: 2px solid #eee; border-radius: 4px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif; font-size: 18px; font-weight: 400;
    color: #111; letter-spacing: 0.15em; text-align: center;
    outline: none; transition: border-color 0.2s;
  }
  .field-input::placeholder { color: #bbb; font-size: 14px; letter-spacing: 0.08em; }
  .field-input:focus { border-color: #111; background: #fff; }
  .access-btn {
    width: 100%; margin-top: 1.25rem; padding: 16px;
    background: #111; border: none; border-radius: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
    letter-spacing: 0.2em; color: #fff; cursor: pointer; transition: background 0.2s;
    text-transform: uppercase;
  }
  .access-btn:hover { background: #7d9b76; }
  .access-error { font-size: 12px; color: #c0504a; text-align: center; margin-top: 0.75rem; min-height: 18px; font-weight: 500; }
  .access-footer { font-size: 12px; color: #888; text-align: center; margin-top: 3rem; line-height: 2; }
  .link-verde { color: #7d9b76; cursor: pointer; font-weight: 500; }

  /* APP */
  .app-header {
    width: 100%; display: flex; justify-content: space-between; align-items: center;
    padding-bottom: 1rem; margin-bottom: 1.5rem;
    border-bottom: 2px solid #111;
  }
  .app-logo { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 900; letter-spacing: 0.1em; color: #111; }
  .app-fecha { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: #888; text-align: right; line-height: 1.8; text-transform: uppercase; }

  .tap-hint { font-size: 11px; font-weight: 500; letter-spacing: 0.16em; color: #aaa; text-align: center; margin-bottom: 0.75rem; transition: opacity 0.3s; text-transform: uppercase; }

  .card-wrap { width: 100%; margin-bottom: 1rem; cursor: pointer; }
  .oracle-card {
    width: 100%; background: #fff;
    border: 2px solid #111; border-radius: 8px;
    padding: 2.5rem 1.75rem; min-height: 340px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center; transition: background 0.2s;
    position: relative;
  }
  .oracle-card:hover { background: #fafafa; }

  .card-tag {
    position: absolute; top: 14px; right: 14px;
    background: #7d9b76; color: #fff;
    font-size: 10px; font-weight: 700; letter-spacing: 0.16em;
    padding: 6px 14px; border-radius: 20px; text-transform: uppercase;
    border: 2px solid #5a7a54;
  }

  /* SIMBOLO DECORATIVO */
  .simbolo { margin-bottom: 1rem; }

  .card-idle { display: flex; flex-direction: column; align-items: center; gap: 1rem; }
  .idle-text { font-family: 'Playfair Display', serif; font-size: 18px; font-style: normal; color: #555; line-height: 1.6; }
  .idle-hint { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; color: #bbb; text-transform: uppercase; }

  .card-revealed { display: none; flex-direction: column; align-items: center; gap: 0.9rem; width: 100%; }
  .r-nombre { font-family: 'Playfair Display', serif; font-size: 34px; font-weight: 900; color: #111; letter-spacing: 0.04em; }
  .r-area { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; color: #7d9b76; text-transform: uppercase; }
  .linea { width: 40px; height: 2px; background: #111; margin: 0.1rem 0; }
  .r-mensaje { font-family: 'Playfair Display', serif; font-size: 16px; font-style: normal; color: #333; line-height: 1.8; }

  .afirmacion-wrap { width: 100%; background: #111; border-radius: 6px; padding: 1rem 1.25rem; margin-top: 0.5rem; }
  .afirmacion-label { font-size: 9px; font-weight: 500; letter-spacing: 0.2em; color: #7d9b76; margin-bottom: 6px; text-transform: uppercase; }
  .afirmacion-text { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; color: #ffffff; line-height: 1.6; }

  /* PREGUNTA ACCESS */
  .pregunta-wrap { width: 100%; background: #f5f5f5; border: 2px solid #7d9b76; border-radius: 8px; padding: 1.25rem 1.5rem; text-align: center; }
  .pregunta-label { font-size: 9px; font-weight: 500; letter-spacing: 0.2em; color: #7d9b76; margin-bottom: 8px; text-transform: uppercase; text-align: center; }
  .pregunta-text { font-family: 'Playfair Display', serif; font-size: 15px; font-style: normal; color: #111; line-height: 1.7; font-weight: 700; text-align: center; }

  /* AFTER */
  .after-section { width: 100%; display: none; flex-direction: column; gap: 0.875rem; }
  .after-section.visible { display: flex; }

  .btn-nueva {
    width: 100%; padding: 15px;
    background: #fff; border: 2px solid #111; border-radius: 4px;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    letter-spacing: 0.18em; color: #111; cursor: pointer;
    transition: background 0.2s; text-transform: uppercase;
  }
  .btn-nueva:hover { background: #f0f0f0; }

  .app-footer { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; color: #bbb; text-align: center; margin-top: 1.5rem; text-transform: uppercase; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.5s ease forwards; }
</style>
</head>
<body>

<!-- ACCESO -->
<div class="screen active" id="screen-access">
  <div class="logo-wrap">
    <div class="logo-circulo">
      <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
        <circle cx="15" cy="15" r="3" fill="#111"/>
        <circle cx="15" cy="4" r="1.5" fill="#111"/>
        <circle cx="15" cy="26" r="1.5" fill="#111"/>
        <circle cx="4" cy="15" r="1.5" fill="#111"/>
        <circle cx="26" cy="15" r="1.5" fill="#111"/>
        <line x1="15" y1="6" x2="15" y2="12" stroke="#111" stroke-width="1"/>
        <line x1="15" y1="18" x2="15" y2="24" stroke="#111" stroke-width="1"/>
        <line x1="6" y1="15" x2="12" y2="15" stroke="#111" stroke-width="1"/>
        <line x1="18" y1="15" x2="24" y2="15" stroke="#111" stroke-width="1"/>
      </svg>
    </div>
    <div class="logo-word">ORIGEN</div>
  </div>
  <div style="width:100%">
    <label class="field-label">Código de acceso</label>
    <input class="field-input" id="codigo-input" type="text" placeholder="ingresa tu código" autocomplete="off" spellcheck="false">
    <div class="access-error" id="access-error"></div>
    <button class="access-btn" onclick="verificarCodigo()">Entrar</button>
  </div>
  <div class="access-footer">
    ¿Aún no tienes acceso?<br>
    <span class="link-verde" onclick="alert('Próximamente en origen.app')">Obtén el tuyo aquí</span>
  </div>
</div>

<!-- APP -->
<div class="screen" id="screen-app">
  <div class="app-header">
    <div class="app-logo">ORIGEN</div>
    <div class="app-fecha" id="app-fecha"></div>
  </div>

  <p class="tap-hint" id="tap-hint">Toca para recibir tu mensaje</p>

  <div class="card-wrap" onclick="revelarCarta()">
    <div class="oracle-card" id="oracle-card">
      <div class="card-tag" id="card-tag">Oráculo diario</div>

      <div class="card-idle" id="card-idle">
        <div class="simbolo">
          <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
            <circle cx="30" cy="30" r="28" stroke="#ddd" stroke-width="1.5"/>
            <circle cx="30" cy="30" r="4" fill="#7d9b76"/>
            <circle cx="30" cy="8" r="2.5" fill="#ddd"/>
            <circle cx="30" cy="52" r="2.5" fill="#ddd"/>
            <circle cx="8" cy="30" r="2.5" fill="#ddd"/>
            <circle cx="52" cy="30" r="2.5" fill="#ddd"/>
            <line x1="30" y1="11" x2="30" y2="25" stroke="#ddd" stroke-width="1.5"/>
            <line x1="30" y1="35" x2="30" y2="49" stroke="#ddd" stroke-width="1.5"/>
            <line x1="11" y1="30" x2="25" y2="30" stroke="#ddd" stroke-width="1.5"/>
            <line x1="35" y1="30" x2="49" y2="30" stroke="#ddd" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="1.5" fill="#eee"/>
            <circle cx="48" cy="12" r="1.5" fill="#eee"/>
            <circle cx="12" cy="48" r="1.5" fill="#eee"/>
            <circle cx="48" cy="48" r="1.5" fill="#eee"/>
          </svg>
        </div>
        <div class="idle-text">el universo ya eligió<br>tu mensaje de hoy</div>
        <div class="idle-hint">— presiona para revelar —</div>
      </div>

      <div class="card-revealed" id="card-revealed">
        <div class="simbolo">
          <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
            <circle cx="22" cy="22" r="20" stroke="#111" stroke-width="1.5"/>
            <circle cx="22" cy="22" r="3.5" fill="#7d9b76"/>
            <circle cx="22" cy="6" r="2" fill="#111"/>
            <circle cx="22" cy="38" r="2" fill="#111"/>
            <circle cx="6" cy="22" r="2" fill="#111"/>
            <circle cx="38" cy="22" r="2" fill="#111"/>
            <line x1="22" y1="9" x2="22" y2="18" stroke="#111" stroke-width="1"/>
            <line x1="22" y1="26" x2="22" y2="35" stroke="#111" stroke-width="1"/>
            <line x1="9" y1="22" x2="18" y2="22" stroke="#111" stroke-width="1"/>
            <line x1="26" y1="22" x2="35" y2="22" stroke="#111" stroke-width="1"/>
          </svg>
        </div>
        <div class="r-nombre" id="r-nombre"></div>
        <div class="r-area" id="r-area"></div>
        <div class="linea"></div>
        <div class="r-mensaje" id="r-mensaje"></div>
        <div class="afirmacion-wrap">
          <div class="afirmacion-label">Afirmación del día</div>
          <div class="afirmacion-text" id="r-afirmacion"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="after-section" id="after-section">
    <div class="pregunta-wrap">
      <div class="pregunta-label">Pregunta de consciencia</div>
      <div class="pregunta-text" id="r-pregunta"></div>
    </div>
    <button class="btn-nueva" onclick="nuevaLectura()">Nueva lectura ↻</button>
  </div>

  <div class="app-footer">#VuelveAOrigen</div>
</div>

<script>
  const CODIGOS = ["ORIGEN2025", "BARRAS01", "YALUZ"];

  const PUNTOS = [
    {
      nombre: "Dinero", area: "Abundancia",
      mensaje: "La abundancia no es algo que persigues. Es algo que permites cuando dejas de creer que no mereces recibirla.",
      afirmacion: "Recibo con facilidad todo lo que el universo tiene para mí, ahora y siempre.",
      pregunta: "¿Qué energía y consciencia se requiere para que la abundancia fluya en mi vida con total facilidad y sin esfuerzo?"
    },
    {
      nombre: "Creatividad", area: "Creación",
      mensaje: "Tu creatividad no necesita permiso ni validación. Ya existe. Solo necesita espacio para fluir sin ser juzgada.",
      afirmacion: "Soy un canal abierto para ideas que transforman mi mundo y el de los demás.",
      pregunta: "¿Qué energía y consciencia se requiere para que mi creatividad se exprese sin límites ni juicios?"
    },
    {
      nombre: "Cuerpo", area: "Bienestar",
      mensaje: "Tu cuerpo sabe más de lo que tu mente cree. Detente hoy y escúchalo. Una señal pequeña puede cambiarlo todo.",
      afirmacion: "Mi cuerpo es mi aliado más sabio. Lo honro, lo escucho, lo cuido.",
      pregunta: "¿Qué energía y consciencia se requiere para que mi cuerpo y yo seamos verdaderos aliados hoy?"
    },
    {
      nombre: "Control", area: "Libertad",
      mensaje: "¿Y si el control fuera solo un punto de vista que puedes elegir soltar? La vida fluye mejor cuando dejas de aferrarte a cómo debería ser.",
      afirmacion: "Confío en el flujo de mi vida y me permito ser sin resistencia.",
      pregunta: "¿Qué energía y consciencia se requiere para que en lugar de controlar, pueda confiar y fluir?"
    },
    {
      nombre: "Esperanza", area: "Posibilidad",
      mensaje: "La esperanza no es ingenua — es un acto de valentía. Elige hoy ver la posibilidad donde otros solo ven un límite.",
      afirmacion: "Elijo la posibilidad por encima de la certeza. Siempre hay otra forma.",
      pregunta: "¿Qué energía y consciencia se requiere para que la posibilidad sea mi punto de partida en cada situación?"
    },
    {
      nombre: "Gratitud", area: "Presencia",
      mensaje: "Gratitud no es solo agradecer lo bueno. Es reconocer que incluso lo difícil te lleva hacia quien estás destinada a ser.",
      afirmacion: "Gracias por todo lo que soy, todo lo que tengo y todo lo que estoy creando.",
      pregunta: "¿Qué energía y consciencia se requiere para que la gratitud sea mi estado natural de ser?"
    },
    {
      nombre: "Paz", area: "Calma",
      mensaje: "La paz que buscas afuera ya existe dentro de ti. Hoy no tienes que buscarla — solo recuerda que siempre estuvo ahí.",
      afirmacion: "Soy paz. La irradio, la vivo, la elijo en cada momento.",
      pregunta: "¿Qué energía y consciencia se requiere para que en lugar de buscar la paz, me permita ser la paz?"
    },
    {
      nombre: "Vitalidad", area: "Energía",
      mensaje: "Tu energía es tu recurso más poderoso. Cuida hoy a quién y qué la recibe. No toda puerta merece que la abras.",
      afirmacion: "Mi energía es sagrada. La dirijo con consciencia hacia lo que me expande.",
      pregunta: "¿Qué energía y consciencia se requiere para que mi vitalidad se dirija solo hacia lo que me expande y me nutre?"
    },
    {
      nombre: "Consciencia", area: "Expansión",
      mensaje: "Hoy eres más consciente que ayer. Eso es suficiente. La consciencia no se mide — se vive, se siente, se elige.",
      afirmacion: "Me expando más allá de lo que creía posible. Soy más de lo que pienso.",
      pregunta: "¿Qué energía y consciencia se requiere para que me permita expandirme más allá de todos mis límites conocidos?"
    }
  ];

  let revealed = false;
  let puntoActual = null;

  function verificarCodigo() {
    const val = document.getElementById('codigo-input').value.trim().toUpperCase();
    const err = document.getElementById('access-error');
    if (CODIGOS.includes(val)) {
      document.getElementById('screen-access').classList.remove('active');
      document.getElementById('screen-app').classList.add('active');
      setFecha();
      puntoActual = getPunto();
    } else {
      err.textContent = 'Código no válido — verifica e intenta de nuevo';
      setTimeout(() => err.textContent = '', 3000);
    }
  }

  document.getElementById('codigo-input').addEventListener('keydown', e => { if (e.key === 'Enter') verificarCodigo(); });

  function setFecha() {
    const d = new Date();
    const dias = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    document.getElementById('app-fecha').innerHTML = `${dias[d.getDay()]}<br>${d.getDate()} ${meses[d.getMonth()]}`;
  }

  function getPunto() {
    return PUNTOS[Math.floor(Math.random() * PUNTOS.length)];
  }

  function revelarCarta() {
    if (revealed) return;
    revealed = true;
    const p = puntoActual;
    document.getElementById('r-nombre').textContent = p.nombre;
    document.getElementById('r-area').textContent = p.area.toUpperCase();
    document.getElementById('r-mensaje').textContent = p.mensaje;
    document.getElementById('r-afirmacion').textContent = p.afirmacion;
    document.getElementById('r-pregunta').textContent = p.pregunta;
    document.getElementById('card-idle').style.display = 'none';
    document.getElementById('card-tag').textContent = p.area;
    const rev = document.getElementById('card-revealed');
    rev.style.display = 'flex';
    rev.classList.add('fade-up');
    document.getElementById('tap-hint').style.opacity = '0';
    document.getElementById('after-section').classList.add('visible');
    document.getElementById('oracle-card').style.cursor = 'default';
  }

  function nuevaLectura() {
    revealed = false;
    puntoActual = getPunto();
    document.getElementById('card-idle').style.display = 'flex';
    document.getElementById('card-tag').textContent = 'Oráculo diario';
    const rev = document.getElementById('card-revealed');
    rev.style.display = 'none';
    rev.classList.remove('fade-up');
    document.getElementById('after-section').classList.remove('visible');
    document.getElementById('tap-hint').style.opacity = '1';
    document.getElementById('oracle-card').style.cursor = 'pointer';
  }
</script>
</body>
</html>
